version: '3.8'

services:
  # Servidor de automatización Jenkins (Orquestador central del ecosistema)
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-ci
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops-net
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true

networks:
  devsecops-net:
    driver: bridge

volumes:
  jenkins_data: